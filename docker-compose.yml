services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: txsender
      POSTGRES_PASSWORD: txsender
      POSTGRES_DB: txsender
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txsender"]
      interval: 5s
      timeout: 3s
      retries: 5

  tx-sender:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.yml:/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://txsender:txsender@postgres:5432/txsender?sslmode=disable
      SERVER_PORT: "8080"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
