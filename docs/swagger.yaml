host: localhost:8080
info:
  contact:
    name: API Support
  description: |-
    API for submitting and tracking EVM token transfers across multiple chains.
    Supports native token and ERC20 transfers with nonce management, gas optimization, and retry logic.
  title: EVM Transaction Sender API
  version: "1.0"
paths:
  /health:
    get:
      description: |-
        Returns the operational health of the service, including database connectivity,
        per-chain RPC status and latest block number, and active pipeline queue depths.
        Responds with 200 when all components are healthy, 503 when any component is degraded.
      produces:
      - application/json
      responses:
        "200":
          description: Service is healthy
          schema:
            $ref: '#/definitions/internal_api.HealthResponse'
        "503":
          description: Service is degraded
          schema:
            $ref: '#/definitions/internal_api.HealthResponse'
      summary: Health check
      tags:
      - health
  /transactions:
    get:
      description: |-
        List transactions with optional filtering by chain, sender, or status.
        Supports cursor-based pagination via the `after` query parameter (pass the last transaction ID from the previous page).
      parameters:
      - description: Filter by chain ID
        in: query
        name: chain_id
        type: integer
      - description: Filter by sender address (hex)
        in: query
        name: sender
        type: string
      - description: Filter by status (QUEUED|PENDING|SUBMITTED|CONFIRMED|REVERTED|FAILED)
        in: query
        name: status
        type: string
      - description: 'Maximum number of results to return (default: 50)'
        in: query
        name: limit
        type: integer
      - description: 'Cursor for pagination: ULID of the last transaction from the
          previous page'
        in: query
        name: after
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of transactions
          schema:
            items:
              $ref: '#/definitions/internal_api.TxResponse'
            type: array
        "400":
          description: Invalid query parameter
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: List transactions
      tags:
      - transactions
  /transactions/{id}:
    get:
      description: Fetch a transaction by its ULID identifier, including all broadcast
        attempts and on-chain receipt data.
      parameters:
      - description: Transaction ULID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Transaction details
          schema:
            $ref: '#/definitions/internal_api.TxResponse'
        "404":
          description: Transaction not found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Get transaction
      tags:
      - transactions
  /transfers:
    post:
      consumes:
      - application/json
      description: |-
        Submit a new native or ERC20 token transfer. Returns immediately with QUEUED status;
        the transfer is processed asynchronously by the pipeline.
        Idempotency: repeat requests with the same idempotency_key and identical parameters
        return the original response without creating a duplicate transaction.
      parameters:
      - description: Transfer request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.TransferRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Transfer accepted and queued
          schema:
            $ref: '#/definitions/internal_api.TransferResponse'
        "400":
          description: Invalid request (missing fields, bad address, unsupported chain)
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "403":
          description: Token not whitelisted or disabled
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "404":
          description: Sender key not registered
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "409":
          description: Idempotency key reused with different parameters
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "422":
          description: Semantic error (zero amount, amount overflow, exceeds limit)
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Create transfer
      tags:
      - transfers
produces:
- application/json
schemes:
- http
- https
swagger: "2.0"
