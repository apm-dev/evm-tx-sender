basePath: /v1
consumes:
- application/json
definitions:
  github_com_apm-dev_evm-tx-sender_internal_pipeline.PipelineInfo:
    properties:
      queue_depth:
        type: integer
      status:
        type: string
    type: object
  internal_api.AttemptResp:
    properties:
      attempt_number:
        type: integer
      gas_price:
        type: string
      max_fee_per_gas:
        type: string
      max_priority_fee_per_gas:
        type: string
      status:
        type: string
      submitted_at:
        type: string
      tx_hash:
        type: string
    type: object
  internal_api.ChainHealth:
    properties:
      block_number:
        type: integer
      healthy:
        type: boolean
      rpc_endpoints:
        type: integer
    type: object
  internal_api.ErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  internal_api.HealthResponse:
    properties:
      chains:
        additionalProperties:
          $ref: '#/definitions/internal_api.ChainHealth'
        type: object
      db:
        type: string
      pipelines:
        additionalProperties:
          $ref: '#/definitions/github_com_apm-dev_evm-tx-sender_internal_pipeline.PipelineInfo'
        type: object
      status:
        type: string
    type: object
  internal_api.TransferRequest:
    properties:
      amount:
        type: string
      chain_id:
        type: integer
      idempotency_key:
        type: string
      metadata:
        items:
          type: integer
        type: array
      priority:
        type: string
      recipient:
        type: string
      sender:
        type: string
      token:
        type: string
    type: object
  internal_api.TransferResponse:
    properties:
      amount:
        type: string
      chain_id:
        type: integer
      created_at:
        type: string
      id:
        type: string
      recipient:
        type: string
      sender:
        type: string
      status:
        type: string
      token:
        type: string
      token_contract:
        type: string
      transfer_type:
        type: string
    type: object
  internal_api.TxResponse:
    properties:
      attempts:
        items:
          $ref: '#/definitions/internal_api.AttemptResp'
        type: array
      block_hash:
        type: string
      block_number:
        type: integer
      chain_id:
        type: integer
      confirmations:
